# Coturn is configured entirely through the command-line args below; no
# turnserver.conf is mounted (the "Cannot find config file" warning at startup
# is expected and harmless).
#
# The same .env used by docker-compose.prod.yml must define, in addition to
# the TURN_* variables consumed here, the ICE configuration the API serves to
# clients at GET /api/webrtc/ice-servers. Both the API and coturn read the
# same WEBRTC_TURN_* variables so one .env configures both containers:
#   WEBRTC_TURN_HOST=sonicrelay-turn.hugodotnet.dev
#   WEBRTC_TURN_REALM=sonicrelay-turn.hugodotnet.dev
#   WEBRTC_TURN_SECRET=<shared secret, also used by the API for HMAC credentials>
#   WEBRTC_TURN_TTL_SECONDS=3600            # optional, defaults to 3600
#   WEBRTC_ENABLE_GOOGLE_STUN_FALLBACK=false # keep false in production
#
# WEBRTC_TURN_HOST's DNS record must be DNS-only (grey cloud), not proxied
# through Cloudflare or any other HTTP(S) proxy -- TURN/STUN need direct
# UDP/TCP reachability on the ports below.
services:
  coturn:
    image: coturn/coturn:${COTURN_VERSION:-latest}
    container_name: coturn
    restart: unless-stopped
    command:
      - --listening-port=3478
      - --tls-listening-port=5349
      - --realm=${WEBRTC_TURN_REALM:?WEBRTC_TURN_REALM is required}
      - --server-name=${WEBRTC_TURN_REALM:?WEBRTC_TURN_REALM is required}
      - --external-ip=${TURN_EXTERNAL_IP:?TURN_EXTERNAL_IP is required}
      - --min-port=${TURN_MIN_PORT:-49160}
      - --max-port=${TURN_MAX_PORT:-49200}
      - --fingerprint
      - --lt-cred-mech
      - --use-auth-secret
      - --static-auth-secret=${WEBRTC_TURN_SECRET:?WEBRTC_TURN_SECRET is required}
      - --no-multicast-peers
      - --log-file=stdout
      - --simple-log
    ports:
      - "${TURN_PORT:-3478}:3478/udp"
      - "${TURN_PORT:-3478}:3478/tcp"
      - "${TURNS_PORT:-5349}:5349/tcp"
      - "${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}:${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}/udp"
    networks:
      - infra_network

networks:
  infra_network:
    external: true
    name: infra_network
