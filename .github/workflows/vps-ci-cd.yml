name: VPS CI/CD

on:
  push:
    branches:
      - main
      - codex/define-backend-architecture-for-sonicrelay
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to the VPS after publishing the image
        required: true
        type: boolean
        default: true

env:
  DOTNET_VERSION: 10.0.x
  DOTNET_MAJOR: "10.0"
  CONFIGURATION: Release
  APP_PROJECT: services/SonicRelay.Api/SonicRelay.Api.csproj
  MIGRATIONS_PROJECT: src/SonicRelay.Infrastructure/SonicRelay.Infrastructure.csproj
  IMAGE_NAME: ghcr.io/vitorhugo-java/sonicrelay-api
  VPS_APP_DIR_DEFAULT: /docker/sonicRelay

concurrency:
  group: sonicrelay-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_dotnet_project: ${{ steps.resolve.outputs.has_dotnet_project }}
      app_project: ${{ steps.resolve.outputs.app_project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve .NET project
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f "$APP_PROJECT" ]]; then
            echo "::error file=$APP_PROJECT::Configured API project was not found."
            exit 1
          fi

          echo "has_dotnet_project=true" >> "$GITHUB_OUTPUT"
          echo "app_project=$APP_PROJECT" >> "$GITHUB_OUTPUT"
          echo "Using configured project: $APP_PROJECT"

      - name: Setup .NET
        if: steps.resolve.outputs.has_dotnet_project == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        if: steps.resolve.outputs.has_dotnet_project == 'true'
        run: dotnet restore "${{ steps.resolve.outputs.app_project }}"

      - name: Build
        if: steps.resolve.outputs.has_dotnet_project == 'true'
        run: dotnet build "${{ steps.resolve.outputs.app_project }}" --configuration "${{ env.CONFIGURATION }}" --no-restore

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.has_dotnet_project == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t test_projects < <(find . -type f \( -iname '*Test.csproj' -o -iname '*Tests.csproj' \) \
            ! -path '*/bin/*' \
            ! -path '*/obj/*' \
            | sort)

          if (( ${#test_projects[@]} == 0 )); then
            echo "::warning::No test project found. Skipping dotnet test for now."
            exit 0
          fi

          mkdir -p TestResults
          for test_project in "${test_projects[@]}"; do
            echo "Testing ${test_project#./}"
            dotnet restore "$test_project"
            dotnet test "$test_project" \
              --configuration "${{ env.CONFIGURATION }}" \
              --no-restore \
              --logger "trx" \
              --results-directory TestResults
          done

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: TestResults
          if-no-files-found: ignore

  publish_image:
    name: Publish public GHCR image
    runs-on: ubuntu-latest
    needs:
      - build
      - test
    if: github.event_name != 'pull_request' && needs.build.outputs.has_dotnet_project == 'true'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image="${IMAGE_NAME}:sha-${GITHUB_SHA}"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "$image"
            if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_PROJECT=${{ needs.build.outputs.app_project }}
            DOTNET_MAJOR=${{ env.DOTNET_MAJOR }}
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=SonicRelay API
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS over SSH
    runs-on: ubuntu-latest
    needs: publish_image
    if: >-
      ${{
        needs.publish_image.result == 'success' &&
        (
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
        )
      }}
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install EF Core CLI
        shell: bash
        run: |
          set -euo pipefail
          dotnet tool install --global dotnet-ef --version 10.0.0
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore EF bundle projects
        shell: bash
        run: |
          set -euo pipefail
          # Each GitHub Actions job gets a clean workspace; restore again here so dotnet-ef has project.assets.json for both projects.
          dotnet restore "$MIGRATIONS_PROJECT" --runtime linux-x64
          dotnet restore "$APP_PROJECT" --runtime linux-x64

      - name: Build EF Core migration bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deploy
          dotnet ef migrations bundle \
            --configuration "${{ env.CONFIGURATION }}" \
            --project "${{ env.MIGRATIONS_PROJECT }}" \
            --startup-project "${{ env.APP_PROJECT }}" \
            --self-contained \
            --runtime linux-x64 \
            --output deploy/efbundle \
            --force

      - name: Resolve SSH target
        id: ssh_target
        shell: bash
        env:
          RAW_VPS_HOST: ${{ secrets.VPS_HOST }}
          RAW_VPS_PORT: ${{ secrets.VPS_PORT }}
          RAW_VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail

          host="${RAW_VPS_HOST:-}"
          if [[ -z "$host" ]]; then
            echo "::error::VPS_HOST secret is required. Use a host name or IP, not a URL."
            exit 1
          fi

          host="${host#http://}"
          host="${host#https://}"
          host="${host#ssh://}"
          host="${host#tcp://}"
          host="${host#*@}"
          host="${host%%/*}"

          port="${RAW_VPS_PORT:-}"
          if [[ "$host" =~ ^([^:]+):([0-9]+)$ ]]; then
            host="${BASH_REMATCH[1]}"
            if [[ -z "$port" ]]; then
              port="${BASH_REMATCH[2]}"
            fi
          fi

          if [[ -z "$host" ]]; then
            echo "::error::VPS_HOST resolved to an empty host. Check the VPS_HOST secret."
            exit 1
          fi

          if [[ -z "$port" ]]; then
            port="22"
          fi

          if [[ ! "$port" =~ ^[0-9]+$ ]]; then
            echo "::error::VPS_PORT must be numeric."
            exit 1
          fi

          app_dir="${RAW_VPS_APP_DIR:-$VPS_APP_DIR_DEFAULT}"
          if [[ -z "$app_dir" ]]; then
            echo "::error::VPS app directory resolved to empty."
            exit 1
          fi

          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"
          echo "app_dir=$app_dir" >> "$GITHUB_OUTPUT"

      - name: Copy deployment files
        uses: appleboy/scp-action@v1
        with:
          host: ${{ steps.ssh_target.outputs.host }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ steps.ssh_target.outputs.port }}
          source: "deploy/docker-compose.prod.yml,deploy/deploy.sh,deploy/efbundle"
          target: ${{ steps.ssh_target.outputs.app_dir }}
          strip_components: 1
          overwrite: true

      - name: Run deployment
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ needs.publish_image.outputs.image }}
          APP_DIR: ${{ steps.ssh_target.outputs.app_dir }}
        with:
          host: ${{ steps.ssh_target.outputs.host }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ steps.ssh_target.outputs.port }}
          envs: IMAGE,APP_DIR
          script: |
            cd "$APP_DIR"
            chmod +x deploy.sh efbundle
            ./deploy.sh
